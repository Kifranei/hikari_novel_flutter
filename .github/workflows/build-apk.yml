name: 编译 Hikari Novel APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 保留手动触发按钮
    inputs:
      version:
        description: '发布版本号 (例如 v1.0.0，不填则默认使用构建编号)'
        required: false
        type: string

env:
  # 提前启用 Node.js 24 环境，消除 Node 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest # 编译安卓 APK 使用 Linux 环境即可
    
    # 必须赋予写入权限，才能创建 Release
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Release Metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="${VERSION}"
            TITLE="${VERSION}"
          else
            VERSION="${APP_VERSION}-${SHORT_SHA}"
            TAG="auto-build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            TITLE="Auto Build ${APP_VERSION} (${SHORT_SHA})"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Flutter 官方推荐的 Java 发行版
          java-version: '17'   # 较新的 Android 编译工具链通常需要 Java 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'  # 严格对齐作者的 Flutter 版本
          channel: 'stable'          # 对应作者的 stable 分支

      - name: 获取依赖包 (Pub Get)
        run: flutter pub get

      - name: 编译 Release APK (ARM64 + Obfuscation)
        # 指定 arm64 架构，开启混淆，并把调试信息分离到 build/app/outputs/symbols 文件夹
        run: flutter build apk --release --target-platform android-arm64 --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Rename APK (重命名安装包)
        shell: bash
        run: |
          # 执行重命名，拼接出类似 Hikari_Novel_arm64_v1.0.0.apk 的名字
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/Hikari_Novel_arm64_${{ steps.meta.outputs.version }}.apk"

      - name: Zip Debug Symbols (打包符号表)
        run: zip -r debug-symbols.zip build/app/outputs/symbols

      - name: Publish to GitHub Releases (发布到 Releases)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body: |
            这是通过 GitHub Actions 自动构建的 ARM64 APK。

            - 触发方式: `${{ github.event_name }}`
            - 分支: `${{ github.ref_name }}`
            - 提交: `${{ github.sha }}`
            - 应用版本: `${{ steps.meta.outputs.app_version }}`
          # 使用通配符 * 来匹配刚刚重命名好的 APK 文件
          files: |
            build/app/outputs/flutter-apk/Hikari_Novel_arm64_*.apk
            debug-symbols.zip
          generate_release_notes: true
